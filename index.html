<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禪堂燈光模擬訓練系統</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --text-color: #ffffff;
            --btn-active: #4caf50;
            --btn-inactive: #555555;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 500;
        }

        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            justify-content: center;
        }

        /* 模擬器顯示區域 */
        .simulator-viewport {
            position: relative;
            width: 800px;
            height: 450px;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* 讓黑階與對比度切換時柔和過渡 */
            transition: filter 0.25s ease-in-out; 
        }

        /* 基礎全黑底圖 */
        .base-layer {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 燈光疊加層：移除所有不自然的 CSS 遮罩，恢復原圖真實擴散 */
        .light-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 改用 plus-lighter，點亮時色彩更扎實，比 screen 更不容易局部死白 */
            mix-blend-mode: plus-lighter; 
            opacity: 0;
            transition: opacity 0.25s ease-in-out; 
            pointer-events: none;
        }

        .light-layer.active {
            opacity: 1; /* 預設完全釋放照片原本的真實亮度 */
        }

        /* 開關控制面板區域 */
        .control-panels {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 320px;
        }

        .panel-group {
            background-color: var(--panel-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .panel-group h3 {
            margin-top: 0;
            margin-bottom: 12px;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            font-size: 16px;
            color: #ddd;
        }

        .switch-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .grid-3-cols {
            grid-template-columns: repeat(3, 1fr);
        }

        .switch-btn {
            background-color: var(--btn-inactive);
            color: white;
            border: none;
            padding: 12px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2);
        }

        .switch-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .switch-btn.on {
            background-color: var(--btn-active);
            box-shadow: inset 0 3px 0 rgba(0,0,0,0.2), 0 2px 5px rgba(76,175,80,0.4);
        }
    </style>
</head>
<body>

    <h1>禪堂燈光模擬訓練系統</h1>

    <div class="main-container">
        
        <!-- 左側：影像模擬顯示器 -->
        <div class="simulator-viewport">
            <img src="assets/zen-dark.jpg" class="base-layer" alt="禪堂全黑基礎圖">
            
            <!-- 燈光疊加層 (恢復乾淨乾淨的圖層結構) -->
            <img id="layer-gate-detect" src="assets/gate-detect.jpg" class="light-layer">
            <img id="layer-back-detect" src="assets/back-detect.jpg" class="light-layer">
            <img id="layer-l1" src="assets/light-mid-left1.jpg" class="light-layer">
            <img id="layer-l2" src="assets/light-l2.jpg" class="light-layer">
            <img id="layer-l3" src="assets/light-l3.jpg" class="light-layer">
            <img id="layer-l4" src="assets/light-l4.jpg" class="light-layer">
            
            <img id="layer-altar" src="assets/light-altar.jpg" class="light-layer">
            <img id="layer-buddha-projector" src="assets/light-buddha-projector.jpg" class="light-layer">
            <img id="layer-main-projector" src="assets/light-main-projector.jpg" class="light-layer">
            <img id="layer-niche-outer" src="assets/light-niche-outer-recessed.jpg" class="light-layer">
            <img id="layer-niche-inner" src="assets/light-niche-inner-recessed.jpg" class="light-layer">
            <img id="layer-halogen" src="assets/light-halogen.jpg" class="light-layer">
        </div>

        <!-- 右側：實體開關面板模擬 -->
        <div class="control-panels">
            
            <div class="panel-group">
                <h3>主要控制大面板</h3>
                <div class="switch-grid grid-3-cols">
                    <button class="switch-btn" data-target="layer-gate-detect">大門感應</button>
                    <button class="switch-btn" data-target="layer-back-detect">後門感應</button>
                    <button class="switch-btn" data-target="layer-l1">主要大燈 1</button>
                    
                    <button class="switch-btn" data-target="layer-l3">主要大燈 3</button>
                    <button class="switch-btn" data-target="layer-l2">主要大燈 2</button>
                    <button class="switch-btn" data-target="layer-l4">4-佛 (大燈)</button> 
                </div>
            </div>

            <div class="panel-group">
                <h3>前壇與特殊照明面板</h3>
                <div class="switch-grid">
                    <button class="switch-btn" data-target="layer-altar">消超壇</button>
                    <button class="switch-btn" data-target="layer-buddha-projector">佛像-投</button>
                    <button class="switch-btn" data-target="layer-main-projector">主法-投</button>
                    
                    <button class="switch-btn" data-target="layer-niche-outer">佛龕-崁外</button>
                    <button class="switch-btn" data-target="layer-niche-inner">佛龕-崁內</button>
                    <button class="switch-btn" data-target="layer-halogen">鹵素燈</button>
                </div>
            </div>

        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('.switch-btn');
            const layers = document.querySelectorAll('.light-layer');
            const viewport = document.querySelector('.simulator-viewport');

            // 核心動態優化：不切斷光線，而是透過控制整體畫面的對比與亮度來逼出細節
            function stabilizeVisuals() {
                const activeLayers = document.querySelectorAll('.light-layer.active');
                const count = activeLayers.length;

                let globalBrightness = 1.0;
                let globalContrast = 1.0;
                let layerOpacity = 1.0;

                if (count <= 1) {
                    // 單燈開啟：完全原汁原味，不限制擴散
                    layerOpacity = 1.0;
                    globalBrightness = 1.0;
                    globalContrast = 1.0;
                } else if (count === 2) {
                    layerOpacity = 0.95;
                    globalBrightness = 1.0;
                    globalContrast = 1.05; // 微調對比，壓制雙圖層疊加的黑底雜訊
                } else if (count === 3) {
                    layerOpacity = 0.90;
                    globalBrightness = 0.95; // 微調總亮度，保護高光
                    globalContrast = 1.12;   // 逼出暗部線條
                } else {
                    // 4盞燈以上邁向全開：透過拉高對比度 (Contrast) 來執行「高光壓制與暗部回歸」
                    // 這樣燈光照亮遠處的細節不會不見，但畫面不會白茫茫
                    layerOpacity = Math.max(0.75, 1.0 - (count * 0.03)); 
                    globalBrightness = Math.max(0.82, 1.0 - (count * 0.02)); 
                    globalContrast = Math.min(1.35, 1.0 + (count * 0.04));   
                }

                // 套用各圖層透明度
                layers.forEach(layer => {
                    if (layer.classList.contains('active')) {
                        layer.style.opacity = layerOpacity;
                    } else {
                        layer.style.opacity = 0;
                    }
                });

                // 套用全局動態校正濾鏡
                if (count > 1) {
                    viewport.style.filter = `brightness(${globalBrightness}) contrast(${globalContrast})`;
                } else {
                    viewport.style.filter = 'none';
                }
            }

            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    const targetLayerId = button.getAttribute('data-target');
                    const targetLayer = document.getElementById(targetLayerId);

                    button.classList.toggle('on');

                    if (button.classList.contains('on')) {
                        if (targetLayer) targetLayer.classList.add('active');
                    } else {
                        if (targetLayer) targetLayer.classList.remove('active');
                    }

                    stabilizeVisuals();
                });
            });
        });
    </script>
</body>
</html>
