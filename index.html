<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普豐精舍：禪堂燈控實景互動</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #121214;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { text-align: center; padding: 10px; }
        h1 { margin: 5px 0; color: #ffd700; font-size: 22px; }

        /* 關卡選單 */
        .level-menu { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center; }
        .level-btn {
            background-color: #333; color: #fff; border: 2px solid #555;
            padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: all 0.3s;
            font-size: 13px;
        }
        .level-btn.active { background-color: #ffd700; color: #000; border-color: #ffd700; }

        /* 遊戲主容器 */
        .game-container {
            display: flex;
            flex-direction: column;
            width: 95%;
            max-width: 800px;
            background: #1e1e24;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            margin-bottom: 12px;
        }

        /* 上方：禪堂實景區 */
        .zen-hall {
            position: relative;
            width: 100%;
            background-color: #000;
            line-height: 0;
        }
        .zen-bg {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            transition: filter 0.5s ease;
        }
        /* 當大燈打開時，利用 CSS 濾鏡模擬大光明效果，您也可以在未來替換成 real-bright.jpg */
        .zen-bg.bright {
            filter: brightness(1.6) contrast(1.1) saturate(1.1);
        }

        .light-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 245, 220, 0.4);
            mix-blend-mode: screen; pointer-events: none; opacity: 0; transition: opacity 0.5s ease;
        }

        /* 虛擬布幕 */
        .projector-screen {
            position: absolute;
            top: -50%; left: 25%; width: 50%; height: 35%;
            background: #eee; border: 2px solid #333; color: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; transition: top 1s ease; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            line-height: 1.4;
        }
        .projector-screen.down { top: 10%; }

        /* 下方：實體開關相片區 */
        .panel-container {
            position: relative;
            width: 100%;
            background-color: #2a2a30;
            line-height: 0;
        }
        .real-panel-img {
            width: 100%; height: auto; display: block; object-fit: contain;
        }

        /* 精準點擊熱區 */
        .hit-box {
            position: absolute;
            background-color: rgba(0, 255, 0, 0); 
            border: 2px dashed transparent;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .hit-box:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        .hit-box.active {
            background-color: rgba(255, 215, 0, 0.35);
            border-color: #ffd700;
            box-shadow: 0 0 10px #ffd700;
        }

        /* --------------------------------------------------
           按鈕熱區位置座標 (%值)
        -------------------------------------------------- */
        /* 左側大面板 */
        #hit-gate-detect   { top: 21%; left: 9.3%;  width: 8.5%; height: 16%; } 
        #hit-center-detect { top: 40%; left: 9.3%;  width: 8.5%; height: 16%; } 
        #hit-back-detect   { top: 59%; left: 9.3%;  width: 8.5%; height: 16%; } 

        /* 中間大面板 - 左排 */
        #hit-mid-left1     { top: 22%; left: 31.3%; width: 8.5%; height: 15%; } 
        #hit-west-detect   { top: 40%; left: 31.3%; width: 8.5%; height: 15%; } 
        #hit-niche-glow    { top: 58%; left: 31.3%; width: 8.5%; height: 15%; } 

        /* 中間大面板 - 右排 */
        #hit-l1            { top: 22%; left: 46.2%; width: 8.2%; height: 14%; } 
        #hit-l2            { top: 39%; left: 46.2%; width: 8.2%; height: 14%; } 
        #hit-l4            { top: 57%; left: 46.2%; width: 8.2%; height: 14%; } 

        /* 右側大面板 - 左排 */
        #hit-altar         { top: 24%; left: 68.2%; width: 8.2%; height: 14%; } 
        #hit-buddha-cast   { top: 42%; left: 68.2%; width: 8.2%; height: 14%; } 
        #hit-main-cast     { top: 59%; left: 68.2%; width: 8.2%; height: 14%; } 

        /* 右側大面板 - 右排 */
        #hit-l3            { top: 24%; left: 82.5%; width: 8.2%; height: 14%; } 
        #hit-niche-out     { top: 42%; left: 82.5%; width: 8.2%; height: 14%; } 
        #hit-halogen       { top: 59%; left: 82.5%; width: 8.2%; height: 14%; } 

        /* 下方引導面板 */
        .info-panel {
            width: 95%; max-width: 800px; background: #25252d;
            padding: 12px; border-radius: 8px; text-align: center; box-sizing: border-box;
        }
        #task-title { color: #ffd700; font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        #hint-msg { color: #ff9800; font-size: 14px; line-height: 1.4; }
        #current-action { color: #a8ffb2; font-size: 13px; margin-top: 5px; font-weight: bold; min-height: 18px; }
    </style>
</head>
<body>

    <header>
        <h1>普豐精舍：禪堂燈控實景互動</h1>
    </header>

    <div class="level-menu">
        <button class="level-btn active" id="btn-lvl1" onclick="switchLevel(1)">第一關：課前開燈</button>
        <button class="level-btn" id="btn-lvl2" onclick="switchLevel(2)">第二關：開始靜坐</button>
        <button class="level-btn" id="btn-lvl3" onclick="switchLevel(3)">第三關：開靜結束</button>
        <button class="level-btn" id="btn-lvl4" onclick="switchLevel(4)">第四關：播放PPT</button>
    </div>

    <div class="game-container">
        <!-- 上方：禪堂全暗實景（100%全景呈現） -->
        <div class="zen-hall">
            <img src="zen-dark.jpg" id="zen-image" class="zen-bg" alt="禪堂實景">
            <div class="light-overlay" id="environmental-light"></div>

            <!-- 虛幕投影 -->
            <div class="projector-screen" id="projectorScreen">
                <span style="font-size: 15px; margin-bottom: 2px;">📖 佛法課程 PPT</span>
                <span style="font-size: 11px; color: #666;">(大燈3區已關閉，投影清晰)</span>
            </div>
        </div>

        <!-- 下方：實體開關相片區（100%全景呈現） -->
        <div class="panel-container">
            <img src="switches-panel.jpg" class="real-panel-img" alt="實體開關面板">

            <!-- 按鈕透明點擊盒與滑鼠滑入提示 -->
            <div class="hit-box" id="hit-gate-detect" title="大門-探" onclick="toggleSwitch('gate-detect')"></div>
            <div class="hit-box" id="hit-center-detect" title="中央-探" onclick="toggleSwitch('center-detect')"></div>
            <div class="hit-box" id="hit-back-detect" title="後牆-探" onclick="toggleSwitch('back-detect')"></div>
            
            <div class="hit-box" id="hit-mid-left1" title="中排左上(無標籤)" onclick="toggleSwitch('mid-left1')"></div>
            <div class="hit-box" id="hit-west-detect" title="西牆-探" onclick="toggleSwitch('west-detect')"></div>
            <div class="hit-box" id="hit-niche-glow" title="龕內日光" onclick="toggleSwitch('niche-glow')"></div>
            
            <div class="hit-box" id="hit-l1" title="1-門 (主要大燈)" onclick="toggleSwitch('l1')"></div>
            <div class="hit-box" id="hit-l2" title="2 (主要大燈)" onclick="toggleSwitch('l2')"></div>
            <div class="hit-box" id="hit-l4" title="4-佛 (主要大燈)" onclick="toggleSwitch('l4')"></div>
            
            <div class="hit-box" id="hit-altar" title="消超壇 (功能燈)" onclick="toggleSwitch('altar')"></div>
            <div class="hit-box" id="hit-buddha-cast" title="佛像-投 (投射燈)" onclick="toggleSwitch('buddha-cast')"></div>
            <div class="hit-box" id="hit-main-cast" title="主法-投 (投射燈)" onclick="toggleSwitch('main-cast')"></div>
            
            <div class="hit-box" id="hit-l3" title="3 (主要大燈 / 佛龕-嵌外)" onclick="toggleSwitch('l3')"></div>
            <div class="hit-box" id="hit-niche-out" title="佛龕-嵌內" onclick="toggleSwitch('niche-out')"></div>
            <div class="hit-box" id="hit-halogen" title="鹵素燈" onclick="toggleSwitch('halogen')"></div>
        </div>
    </div>

    <div class="info-panel">
        <div id="task-title">第一關任務：課前開燈</div>
        <div id="hint-msg">載入中...</div>
        <div id="current-action"></div>
    </div>

    <script>
        // 對應開關的繁體中文名稱
        const switchNames = {
            'gate-detect': '大門-探', 'center-detect': '中央-探', 'back-detect': '後牆-探',
            'mid-left1': '中排左上', 'west-detect': '西牆-探', 'niche-glow': '龕內日光',
            'l1': '大燈 1-門', 'l2': '大燈 2', 'l4': '大燈 4-佛',
            'altar': '消超壇', 'buddha-cast': '佛像-投', 'main-cast': '主法-投',
            'l3': '大燈 3', 'niche-out': '佛龕-嵌內', 'halogen': '鹵素燈'
        };

        const switches = {
            'gate-detect': false, 'center-detect': false, 'back-detect': false,
            'mid-left1': false, 'west-detect': false, 'niche-glow': false,
            'l1': false, 'l2': false, 'l4': false,
            'altar': false, 'buddha-cast': false, 'main-cast': false,
            'l3': false, 'niche-out': false, 'halogen': false
        };
        
        let currentLevel = 1;

        function switchLevel(lvl) {
            currentLevel = lvl;
            for(let i=1; i<=4; i++) document.getElementById(`btn-lvl${i}`).classList.toggle('active', i === lvl);
            
            if (lvl === 1) {
                // 第一關：初始全部關閉
                Object.keys(switches).forEach(k => switches[k] = false);
            } else if (lvl === 2) {
                // 第二關：初始為大放光明（除了沒作用的燈以外，大燈與功能燈全開）
                Object.keys(switches).forEach(k => switches[k] = true);
                switches['mid-left1'] = false; switches['halogen'] = false;
            } else if (lvl === 3) {
                // 第三關：靜坐結束時，場上應該只剩下主法-投
                Object.keys(switches).forEach(k => switches[k] = false);
                switches['main-cast'] = true;
            } else if (lvl === 4) {
                // 第四關：放PPT前，燈光回到全開狀態
                Object.keys(switches).forEach(k => switches[k] = true);
                switches['mid-left1'] = false; switches['halogen'] = false;
            }

            // 同步介面高亮
            Object.keys(switches).forEach(k => {
                document.getElementById('hit-' + k).classList.toggle('active', switches[k]);
            });

            document.getElementById('current-action').innerText = "";
            updateUIByLevel(lvl);
            updateVisuals();
        }

        function updateUIByLevel(lvl) {
            const t = document.getElementById('task-title');
            const h = document.getElementById('hint-msg');
            switch(lvl) {
                case 1:
                    t.innerText = "第一關：課前開燈 (大放光明)";
                    h.innerText = "請點擊開關，將主要大燈（1-門、2、3、4-佛、龕內日光）及功能燈全部打開（不開鹵素燈）。";
                    break;
                case 2:
                    t.innerText = "第二關：開始靜坐 (依序關閉)";
                    h.innerText = "按照提示順序關燈：先關功能燈 ➔ 關閉大燈（順序：龕內日光 ➔ 4-佛 ➔ 3 ➔ 2 ➔ 1-門） ➔ 最終只留下「主法-投」。";
                    break;
                case 3:
                    t.innerText = "第三關：開靜結束 (開靜開燈)";
                    h.innerText = "請依相反順序復原燈光：先點開主要大燈（依序：1-門 ➔ 2 ➔ 3 ➔ 4-佛 ➔ 龕內日光） ➔ 再補開其餘環境功能燈。";
                    break;
                case 4:
                    t.innerText = "第四關：準備投影放 PPT";
                    h.innerText = "請點擊「消超壇」降下布幕，並關閉會直射布幕的「大燈 3」區以防止反光！";
                    break;
            }
        }

        function toggleSwitch(id) {
            switches[id] = !switches[id];
            document.getElementById('hit-' + id).classList.toggle('active', switches[id]);
            
            // 顯示當前點擊的燈具名稱與狀態
            const statusText = switches[id] ? "開啟" : "關閉";
            document.getElementById('current-action').innerText = `💡 切換狀態：[${switchNames[id]}] 已${statusText}`;

            updateVisuals();
            checkWinCondition();
        }

        function updateVisuals() {
            // 計算大燈跟功能燈亮起的數量，來決定畫面的明暗度
            let onCount = 0;
            const coreLights = ['l1', 'l2', 'l3', 'l4', 'niche-glow', 'buddha-cast', 'main-cast'];
            coreLights.forEach(k => { if(switches[k]) onCount++; });
            
            const ratio = onCount / coreLights.length;
            document.getElementById('environmental-light').style.opacity = ratio * 0.7;

            // 如果主要大燈開了 3 盞以上，背景圖切換為明亮濾鏡效果
            const zenImg = document.getElementById('zen-image');
            if (onCount >= 4) {
                zenImg.classList.add('bright');
            } else {
                zenImg.classList.remove('bright');
            }

            // 第四關連動：以「消超壇」作為降下布幕開關
            const screen = document.getElementById('projectorScreen');
            if (switches['altar']) screen.classList.add('down');
            else screen.classList.remove('down');
        }

        function checkWinCondition() {
            if (currentLevel === 1) {
                // 第一關過關條件：大燈 1,2,3,4 加上 龕內日光、主法投、佛像投皆開啟
                if (switches['l1'] && switches['l2'] && switches['l3'] && switches['l4'] && switches['niche-glow'] && switches['main-cast'] && switches['buddha-cast']) {
                    setTimeout(() => { alert("🎉 第一關【課前開燈】成功！殿堂已大放光明。"); switchLevel(2); }, 300);
                }
            } 
            else if (currentLevel === 2) {
                // 第二關過關條件：除了主法-投是開著的，其餘主要大燈與功能燈皆已順利關閉
                const allMainOff = !switches['l1'] && !switches['l2'] && !switches['l3'] && !switches['l4'] && !switches['niche-glow'] && !switches['buddha-cast'] && !switches['altar'];
                if (allMainOff && switches['main-cast']) {
                    setTimeout(() => { alert("🎉 第二關【開始靜坐】成功！大眾已安住定境。"); switchLevel(3); }, 300);
                }
            } 
            else if (currentLevel === 3) {
                // 第三關過關條件：復原大燈與投射燈
                if (switches['l1'] && switches['l2'] && switches['l3'] && switches['l4'] && switches['niche-glow'] && switches['buddha-cast']) {
                    setTimeout(() => { alert("🎉 第三關【結束靜坐】成功！大眾順利適應光線。"); switchLevel(4); }, 300);
                }
            } 
            else if (currentLevel === 4) {
                // 第四關過關條件：消超壇(布幕)開啟，且大燈 3 關閉
                if (switches['altar'] && !switches['l3']) {
                    setTimeout(() => { alert("🎉 恭喜完全通關！您已完全精通精舍的實體燈控與課堂切換流程！"); }, 300);
                }
            }
        }

        // 初始化啟動
        switchLevel(1);
    </script>
</body>
</html>
