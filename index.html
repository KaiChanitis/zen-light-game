<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普豐精舍：掌燈人挑戰 (實景還原版)</title>
    <style>
        :root {
            --panel-bg: #eae3d2;
            --switch-off-bg: #eeeeee;
            --switch-on-bg: #fff;
            --label-yellow: #ffeb3b;
            --label-orange: #ff9800;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #121214;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 15px;
        }

        h1 {
            margin: 0;
            color: #ffd700;
            font-size: 24px;
        }

        /* 遊戲主容器 */
        .game-container {
            display: flex;
            width: 95%;
            max-width: 1100px;
            height: 520px;
            background: #1e1e24;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }

        /* 左側：禪堂實景模擬 */
        .zen-hall {
            flex: 1.2;
            position: relative;
            background-color: #111115;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            transition: background-color 1s ease;
        }

        /* 實景燈光圖層 */
        .buddha-light {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(255,223,100,0.9) 0%, rgba(255,223,100,0) 70%);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 1s ease;
            position: absolute;
            top: 15%;
            z-index: 2;
        }

        .merit-lights {
            display: flex;
            justify-content: space-between;
            width: 85%;
            position: absolute;
            top: 40%;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 2;
        }
        .merit-lamp {
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #ff5722 0%, rgba(255,87,34,0) 70%);
            border-radius: 50%;
            box-shadow: 0 0 15px #ff5722;
        }

        /* 東西外側走廊燈光模擬 */
        .side-hallway {
            position: absolute;
            top: 0; width: 10%; height: 100%;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 2;
        }
        #west-hallway { left: 0; background: linear-gradient(to right, rgba(255,235,150,0.4), transparent); }
        #east-hallway { right: 0; background: linear-gradient(to left, rgba(255,235,150,0.4), transparent); }

        /* 殿堂大燈分區 (1-4 區) */
        .light-zone {
            position: absolute;
            left: 10%;
            width: 80%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 1;
        }
        #zone-1 { background: radial-gradient(ellipse at top, rgba(255,255,240,0.3) 0%, transparent 60%); top: 0; }
        #zone-2 { background: radial-gradient(ellipse at 33% 10%, rgba(255,255,240,0.3) 0%, transparent 60%); top: 0; }
        #zone-3 { background: radial-gradient(ellipse at 66% 10%, rgba(255,255,240,0.3) 0%, transparent 60%); top: 0; }
        #zone-4 { background: radial-gradient(ellipse at bottom, rgba(255,255,240,0.3) 0%, transparent 60%); top: 0; }

        .zen-title {
            z-index: 3;
            font-size: 22px;
            font-weight: bold;
            color: #777;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* 右側：完整還原開關牆面 */
        .wall-panel {
            flex: 1.5;
            background-color: #f7f4eb;
            color: #333;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow-y: auto;
            border-left: 5px solid #ccc;
        }

        .panel-header {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            color: #444;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }

        /* 三大塊實體開關配置 */
        .physical-switch-grid {
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }

        /* 單個實體開關盒 */
        .switch-box {
            background-color: var(--panel-bg);
            border: 2px solid #bbb;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1), 0 3px 6px rgba(0,0,0,0.1);
        }

        /* 左面板(雙扣) */
        .box-left { width: 22%; }
        /* 中面板(六扣) */
        .box-middle { width: 38%; }
        /* 右面板(六扣標籤) */
        .box-right { width: 38%; }

        /* 實體微型開關按鍵元件 */
        .physical-switch {
            background: #fff;
            border: 1px solid #aaa;
            border-radius: 4px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            user-select: none;
            position: relative;
            box-shadow: 0 2px 3px rgba(0,0,0,0.15);
        }

        /* 按鍵開關的凹凸視覺感 */
        .switch-rocker {
            width: 24px;
            height: 18px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 2px;
            position: relative;
            box-shadow: inset 0 2px 2px rgba(0,0,0,0.1);
            transition: all 0.1s;
        }

        /* 開關按下狀態 (ON 往右凸或下凸) */
        .physical-switch.active .switch-rocker {
            background: #e0e0e0;
            box-shadow: inset 0 -2px 2px rgba(0,0,0,0.1);
            border-top: 3px solid #888;
        }

        /* 標籤文字樣式 */
        .switch-tag {
            font-size: 11px;
            font-weight: bold;
            margin-top: 4px;
            padding: 2px 4px;
            border-radius: 2px;
            text-align: center;
            width: 90%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* 標籤顏色還原 */
        .tag-yellow { background-color: var(--label-yellow); color: #000; }
        .tag-orange { background-color: var(--label-orange); color: #fff; }
        .tag-none { background-color: #ddd; color: #555; }

        /* 網格排列六扣開關 */
        .six-button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        /* 狀態指引 */
        .info-panel {
            width: 95%;
            max-width: 1100px;
            background: #25252d;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        #hint-msg {
            color: #ff9800;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }

        #step-guide {
            color: #bbb;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <header>
        <h1>第一關：清晨入寺：開啟光明</h1>
        <p>請依禪修班規定，由內而外莊嚴、安靜地開啟普豐精舍禪堂的燈光設備。</p>
    </header>

    <div class="game-container">
        <div class="zen-hall" id="zenHall">
            <div class="zen-title" id="zenTitle">靜謐禪堂 (微暗)</div>
            
            <div class="buddha-light" id="buddhaLight"></div>
            <div class="merit-lights" id="meritLights">
                <div class="merit-lamp"></div>
                <div class="merit-lamp"></div>
            </div>
            
            <div class="side-hallway" id="west-hallway"></div>
            <div class="side-hallway" id="east-hallway"></div>

            <div class="light-zone" id="zone-1"></div>
            <div class="light-zone" id="zone-2"></div>
            <div class="light-zone" id="zone-3"></div>
            <div class="light-zone" id="zone-4"></div>

            <div style="z-index:3; color: #888; font-size:12px;">【模擬禪堂實景】</div>
        </div>

        <div class="wall-panel">
            <div class="panel-header">普豐精舍 禪堂實體燈控面板</div>
            <div class="physical-switch-grid">
                
                <div class="switch-box box-left">
                    <div style="font-size:10px; text-align:center; color:#666;">佛前/消災</div>
                    <div class="physical-switch" id="sw-buddha" onclick="clickSwitch('buddha')">
                        <div class="switch-rocker"></div>
                        <div class="switch-tag tag-yellow">佛前燈</div>
                    </div>
                    <div class="physical-switch" id="sw-merit" onclick="clickSwitch('merit')">
                        <div class="switch-rocker"></div>
                        <div class="switch-tag tag-orange">消災/功德燈</div>
                    </div>
                </div>

                <div class="switch-box box-middle">
                    <div style="font-size:10px; text-align:center; color:#666;">殿堂大燈分區</div>
                    <div class="six-button-grid">
                        <div class="physical-switch" id="sw-l1" onclick="clickSwitch('l1')">
                            <div class="switch-rocker"></div>
                            <div class="switch-tag tag-yellow">1</div>
                        </div>
                        <div class="physical-switch" id="sw-unused1" onclick="clickSwitch('unused1')">
                            <div class="switch-rocker"></div>
                            <div class="switch-tag tag-none">備用</div>
                        </div>
                        <div class="physical-switch" id="sw-l2" onclick="clickSwitch('l2')">
                            <div class="switch-rocker"></div>
                            <div class="switch-tag tag-yellow">2</div>
                        </div>
                        <div class="physical-switch" id="sw-unused2" onclick="clickSwitch('unused2')">
                            <div class="switch-rocker"></div>
                            <div class="switch-tag tag-none">備用</div>
                        </div>
                        <div class="physical-switch" id="sw-l3" onclick="clickSwitch('l3')">
                            <div class="switch-rocker"></div>
                            <div class="switch-tag tag-yellow">3</div>
                        </div>
                        <div class="physical-switch" id="sw-l4" onclick="clickSwitch('l4')">
                            <div class="switch-rocker"></div>
                            <div class="switch-tag tag-yellow">4</div>
                        </div>
                    </div>
                </div>

                <div class="switch-box box-right">
                    <div style="font-size:10px; text-align:center; color:#666;">東/西廊道功能</div>
                    <div class="six-button-grid">
                        <div class="physical-switch" id="sw-west-out-front" onclick="clickSwitch('west-out-front')">
                            <div class="switch-rocker"></div>
                            <div class="switch-tag tag-yellow">西(前)外</div>
                        </div>
                        <div class="physical-switch" id="sw-east-out-front" onclick="clickSwitch('east-out-front')">
                            <div class="switch-rocker"></div>
                            <div class="switch-tag tag-yellow">東(前)外</div>
                        </div>
                        <div class="physical-switch" id="sw-west-out-back" onclick="clickSwitch('west-out-back')">
                            <div class="switch-rocker"></div>
                            <div class="switch-tag tag-orange">西(後)外</div>
                        </div>
                        <div class="physical-switch" id="sw-east-out-back" onclick="clickSwitch('east-out-back')">
                            <div class="switch-rocker"></div>
                            <div class="switch-tag tag-orange">東(後)外</div>
                        </div>
                        <div class="physical-switch" id="sw-west-indicator" onclick="clickSwitch('west-indicator')">
                            <div class="switch-rocker"></div>
                            <div class="switch-tag tag-orange">西指示燈</div>
                        </div>
                        <div class="physical-switch" id="sw-east-indicator" onclick="clickSwitch('east-indicator')">
                            <div class="switch-rocker"></div>
                            <div class="switch-tag tag-orange">東指示燈</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="info-panel">
        <div id="hint-msg">💡 任務指引：請先開啟「佛前燈」，禮敬三寶。</div>
        <div id="step-guide">當前步驟: 1/8</div>
    </div>

    <script>
        // 紀錄所有開關狀態
        const switches = {
            buddha: false, merit: false,
            l1: false, l2: false, l3: false, l4: false,
            unused1: false, unused2: false,
            'west-out-front': false, 'east-out-front': false,
            'west-out-back': false, 'east-out-back': false,
            'west-indicator': false, 'east-indicator': false
        };

        // 第一關正確開燈步驟順序
        const correctSequence = [
            'buddha',              // 1. 佛前燈
            'merit',               // 2. 消災功德燈
            'west-indicator',      // 3. 西指示燈 (引導指示)
            'east-indicator',      // 4. 東指示燈
            'l1',                  // 5. 殿堂大燈 1 區
            'l2',                  // 6. 殿堂大燈 2 區
            'l3',                  // 7. 殿堂大燈 3 區
            'l4'                   // 8. 殿堂大燈 4 區
        ];

        let currentStep = 1;

        function clickSwitch(id) {
            // 切換開關狀態
            switches[id] = !switches[id];
            const element = document.getElementById('sw-' + id);
            
            if (switches[id]) {
                element.classList.add('active');
                checkStep(id, true);
            } else {
                element.classList.remove('active');
                checkStep(id, false);
            }

            updateVisuals();
        }

        function checkStep(id, isON) {
            // 處理備用或廊道非必要燈光
            if (id.startsWith('unused') || id.includes('out-front') || id.includes('out-back')) {
                return; // 廊道燈隨時可以自由開關，不影響主線順序
            }

            const expectedId = correctSequence[currentStep - 1];

            if (isON && id === expectedId) {
                currentStep++;
                updateGuide();
            } else if (!isON) {
                // 若關閉了前一步已完成的燈，扣回上一步
                if (currentStep > 1 && id === correctSequence[currentStep - 2]) {
                    currentStep--;
                    updateGuide();
                }
            } else {
                // 點錯順序
                alert("💡 順序不合禪堂常規喔！請依指引順序莊嚴開啟。");
                // 自動彈回關閉狀態
                setTimeout(() => {
                    switches[id] = false;
                    document.getElementById('sw-' + id).classList.remove('active');
                    updateVisuals();
                }, 300);
            }

            // 通關條件
            if (currentStep === 9) {
                setTimeout(() => {
                    alert("🎉【第一關圓滿！】\n您已成功依規定開啟殿堂所有主要燈光！\n恭敬莊嚴，準備進入第二關靜坐考驗。");
                }, 500);
            }
        }

        function updateGuide() {
            const stepGuide = document.getElementById('step-guide');
            const hintMsg = document.getElementById('hint-msg');
            stepGuide.innerText = `當前步驟: ${currentStep > 8 ? 8 : currentStep}/8`;

            switch(currentStep) {
                case 1: hintMsg.innerText = "💡 任務指引：請先開啟「佛前燈」，點亮光明心燈。"; break;
                case 2: hintMsg.innerText = "💡 任務指引：開啟「消災/功德燈」，為信眾祈福。"; break;
                case 3: hintMsg.innerText = "💡 任務指引：請先開啟「西指示燈」做好動線導引。"; break;
                case 4: hintMsg.innerText = "💡 任務指引：請開啟「東指示燈」完成引導照明。"; break;
                case 5: hintMsg.innerText = "💡 任務指引：現在由內而外，開啟「殿堂大燈 1 區」。"; break;
                case 6: hintMsg.innerText = "💡 任務指引：請開啟「殿堂大燈 2 區」。"; break;
                case 7: hintMsg.innerText = "💡 任務指引：請開啟「殿堂大燈 3 區」。"; break;
                case 8: hintMsg.innerText = "💡 任務指引：最後開啟靠近門口的「殿堂大燈 4 區」。"; break;
                case 9: hintMsg.innerText = "🌟 殿堂大放光明！第一關順利通關。"; break;
            }
        }

        function updateVisuals() {
            // 更新左側禪堂視景
            document.getElementById('buddhaLight').style.opacity = switches.buddha ? "1" : "0";
            document.getElementById('meritLights').style.opacity = switches.merit ? "1" : "0";
            
            // 東西走廊
            const westOn = switches['west-out-front'] || switches['west-out-back'] || switches['west-indicator'];
            const eastOn = switches['east-out-front'] || switches['east-out-back'] || switches['east-indicator'];
            document.getElementById('west-hallway').style.opacity = westOn ? "1" : "0";
            document.getElementById('east-hallway').style.opacity = eastOn ? "1" : "0";

            // 大燈分區
            document.getElementById('zone-1').style.opacity = switches.l1 ? "1" : "0";
            document.getElementById('zone-2').style.opacity = switches.l2 ? "1" : "0";
            document.getElementById('zone-3').style.opacity = switches.l3 ? "1" : "0";
            document.getElementById('zone-4').style.opacity = switches.l4 ? "1" : "0";

            // 標題顯示
            const zenTitle = document.getElementById('zenTitle');
            let onCount = [switches.l1, switches.l2, switches.l3, switches.l4].filter(Boolean).length;
            if (onCount === 4) {
                zenTitle.innerText = "莊嚴殿堂 (通明)";
                zenTitle.style.color = "#ffd700";
            } else if (onCount > 0) {
                zenTitle.innerText = `殿堂明亮 (已開 ${onCount} 區大燈)`;
                zenTitle.style.color = "#ddd";
            } else if (switches.buddha || switches.merit) {
                zenTitle.innerText = "禪堂 (暖色莊嚴)";
                zenTitle.style.color = "#fbc02d";
            } else {
                zenTitle.innerText = "靜謐禪堂 (微暗)";
                zenTitle.style.color = "#777";
            }
        }
    </script>
</body>
</html>
