<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禪堂燈光模擬訓練系統</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --text-color: #ffffff;
            --btn-active: #4caf50;
            --btn-inactive: #555555;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 500;
        }

        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            justify-content: center;
        }

        /* 模擬器顯示區域 */
        .simulator-viewport {
            position: relative;
            width: 800px;
            height: 450px;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: filter 0.3s ease-in-out; 
        }

        /* 基礎全黑底圖 */
        .base-layer {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 核心：燈光疊加層基礎設定 */
        .light-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            mix-blend-mode: screen; /* 核心加法混光 */
            opacity: 0;
            transition: opacity 0.3s ease-in-out; 
            pointer-events: none;
        }

        /* ==================== 方案一：針對不同燈具設定局部光衰減遮罩 ==================== */
        
        /* 1. 主要大燈與感應燈組：讓發光中心集中在天花板與中後方 (中心點設在畫面上方 50% 25%) */
        .mask-main-lights {
            -webkit-mask-image: radial-gradient(ellipse at 50% 25%, rgba(0,0,0,1) 25%, rgba(0,0,0,0) 80%);
            mask-image: radial-gradient(ellipse at 50% 25%, rgba(0,0,0,1) 25%, rgba(0,0,0,0) 80%);
        }

        /* 2. 前壇與精緻照明組：讓發光中心精準鎖定在正前方佛壇區域 (中心點設在前方偏下 50% 55%) */
        .mask-altar-lights {
            -webkit-mask-image: radial-gradient(circle at 50% 55%, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 70%);
            mask-image: radial-gradient(circle at 50% 55%, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 70%);
        }
        
        /* ============================================================================== */

        /* 開關控制面板區域 */
        .control-panels {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 320px;
        }

        .panel-group {
            background-color: var(--panel-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .panel-group h3 {
            margin-top: 0;
            margin-bottom: 12px;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            font-size: 16px;
            color: #ddd;
        }

        .switch-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .grid-3-cols {
            grid-template-columns: repeat(3, 1fr);
        }

        .switch-btn {
            background-color: var(--btn-inactive);
            color: white;
            border: none;
            padding: 12px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2);
        }

        .switch-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .switch-btn.on {
            background-color: var(--btn-active);
            box-shadow: inset 0 3px 0 rgba(0,0,0,0.2), 0 2px 5px rgba(76,175,80,0.4);
        }
    </style>
</head>
<body>

    <h1>禪堂燈光模擬訓練系統</h1>

    <div class="main-container">
        
        <!-- 左側：影像模擬顯示器 -->
        <div class="simulator-viewport">
            <!-- 全黑底圖 -->
            <img src="assets/zen-dark.jpg" class="base-layer" alt="禪堂全黑基礎圖">
            
            <!-- 燈光疊加層：已依功能分類套用對應的局部光衰減遮罩 -->
            <!-- 主要大燈與感應燈組 (套用 mask-main-lights) -->
            <img id="layer-gate-detect" src="assets/gate-detect.jpg" class="light-layer mask-main-lights">
            <img id="layer-back-detect" src="assets/back-detect.jpg" class="light-layer mask-main-lights">
            <img id="layer-l1" src="assets/light-mid-left1.jpg" class="light-layer mask-main-lights">
            <img id="layer-l2" src="assets/light-l2.jpg" class="light-layer mask-main-lights">
            <img id="layer-l3" src="assets/light-l3.jpg" class="light-layer mask-main-lights">
            <img id="layer-l4" src="assets/light-l4.jpg" class="light-layer mask-main-lights">
            
            <!-- 前壇與特殊照明組 (套用 mask-altar-lights) -->
            <img id="layer-altar" src="assets/light-altar.jpg" class="light-layer mask-altar-lights">
            <img id="layer-buddha-projector" src="assets/light-buddha-projector.jpg" class="light-layer mask-altar-lights">
            <img id="layer-main-projector" src="assets/light-main-projector.jpg" class="light-layer mask-altar-lights">
            <img id="layer-niche-outer" src="assets/light-niche-outer-recessed.jpg" class="light-layer mask-altar-lights">
            <img id="layer-niche-inner" src="assets/light-niche-inner-recessed.jpg" class="light-layer mask-altar-lights">
            <img id="layer-halogen" src="assets/light-halogen.jpg" class="light-layer mask-altar-lights">
        </div>

        <!-- 右側：實體開關面板模擬 -->
        <div class="control-panels">
            
            <!-- 主要控制大面板 -->
            <div class="panel-group">
                <h3>主要控制大面板</h3>
                <div class="switch-grid grid-3-cols">
                    <button class="switch-btn" data-target="layer-gate-detect">大門感應</button>
                    <button class="switch-btn" data-target="layer-back-detect">後門感應</button>
                    <button class="switch-btn" data-target="layer-l1">主要大燈 1</button>
                    
                    <button class="switch-btn" data-target="layer-l3">主要大燈 3</button>
                    <button class="switch-btn" data-target="layer-l2">主要大燈 2</button>
                    <button class="switch-btn" data-target="layer-l4">4-佛 (大燈)</button> 
                </div>
            </div>

            <!-- 最右邊小面板 -->
            <div class="panel-group">
                <h3>前壇與特殊照明面板</h3>
                <div class="switch-grid">
                    <button class="switch-btn" data-target="layer-altar">消超壇</button>
                    <button class="switch-btn" data-target="layer-buddha-projector">佛像-投</button>
                    <button class="switch-btn" data-target="layer-main-projector">主法-投</button>
                    
                    <button class="switch-btn" data-target="layer-niche-outer">佛龕-崁外</button>
                    <button class="switch-btn" data-target="layer-niche-inner">佛龕-崁內</button>
                    <button class="switch-btn" data-target="layer-halogen">鹵素燈</button>
                </div>
            </div>

        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('.switch-btn');
            const layers = document.querySelectorAll('.light-layer');
            const viewport = document.querySelector('.simulator-viewport');

            function adjustDynamicVisuals() {
                const activeLayers = document.querySelectorAll('.light-layer.active');
                const count = activeLayers.length;

                let targetOpacity = 1.0;
                let brightnessFilter = 1.0;
                let contrastFilter = 1.0;

                // 配合方案一的局部遮罩，這裡的調光強度可以稍微放寬（因為邊緣已經不會重複疊加爆白了）
                if (count <= 1) {
                    targetOpacity = 1.0;     
                    brightnessFilter = 1.0;
                    contrastFilter = 1.0;
                } else if (count === 2) {
                    targetOpacity = 0.90;    
                    brightnessFilter = 1.0;
                    contrastFilter = 1.0;
                } else if (count === 3) {
                    targetOpacity = 0.80;    
                    brightnessFilter = 0.98; 
                    contrastFilter = 1.02;   
                } else {
                    // 全開時的極端狀況優化
                    targetOpacity = Math.max(0.60, 1.0 - (count * 0.05)); 
                    brightnessFilter = Math.max(0.90, 1.0 - (count * 0.01)); 
                    contrastFilter = Math.min(1.15, 1.0 + (count * 0.02));   
                }

                layers.forEach(layer => {
                    if (layer.classList.contains('active')) {
                        layer.style.opacity = targetOpacity;
                    } else {
                        layer.style.opacity = 0;
                    }
                });

                if (count > 2) {
                    viewport.style.filter = `brightness(${brightnessFilter}) contrast(${contrastFilter})`;
                } else {
                    viewport.style.filter = 'none';
                }
            }

            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    const targetLayerId = button.getAttribute('data-target');
                    const targetLayer = document.getElementById(targetLayerId);

                    button.classList.toggle('on');

                    if (button.classList.contains('on')) {
                        if (targetLayer) targetLayer.classList.add('active');
                    } else {
                        if (targetLayer) targetLayer.classList.remove('active');
                    }

                    adjustDynamicVisuals();
                });
            });
        });
    </script>
</body>
</html>
