<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普豐精舍：禪堂燈控實景互動</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #121214;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { text-align: center; padding: 10px; }
        h1 { margin: 5px 0; color: #ffd700; font-size: 24px; }

        /* 關卡選單 */
        .level-menu { display: flex; gap: 10px; margin-bottom: 15px; }
        .level-btn {
            background-color: #333; color: #fff; border: 2px solid #555;
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .level-btn.active { background-color: #ffd700; color: #000; border-color: #ffd700; }

        /* 遊戲主容器 */
        .game-container {
            display: flex;
            width: 95%;
            max-width: 1200px;
            height: 550px;
            background: #1e1e24;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }

        /* ================= 左側：禪堂實景區 ================= */
        .zen-hall {
            flex: 1.2;
            position: relative;
            background-color: #000;
            overflow: hidden;
        }
        /* 禪堂實景全暗底圖 */
        .zen-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }
        /* 燈光點亮效果模擬（疊加在實景圖上的環境濾鏡） */
        .light-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 235, 170, 0.25); /* 柔和黃光模擬 */
            mix-blend-mode: screen; /* 讓光線自然融入黑暗照片中 */
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* 虛擬布幕保持不變 */
        .projector-screen {
            position: absolute;
            top: -200px; left: 25%; width: 50%; height: 160px;
            background: #eee; border: 3px solid #333; color: #000;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; transition: top 1s ease; z-index: 10;
        }
        .projector-screen.down { top: 20px; }

        /* ================= 右側：實體開關相片區 ================= */
        .panel-container {
            flex: 1;
            position: relative;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 實體照片面板基底 */
        .real-panel-img {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        /* 💡 虛擬透明點擊熱區 (用來對應真實照片中的按鈕位置) */
        .hit-box {
            position: absolute;
            background-color: rgba(0, 255, 0, 0); /* 預設完全透明，改為 0.3 可以用來抓位置 */
            border: 2px dashed transparent;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        /* 當開關被按下（開啟狀態）時，讓照片上的按鈕稍微發黃光，提示使用者它開著 */
        .hit-box.active {
            background-color: rgba(255, 235, 0, 0.25);
            border-color: #ffd700;
        }

        /* --------------------------------------------------
           ⚠️ 下方的百分比（top, left, width, height）
           是根據「開關照片」比例抓的虛擬位置。
           上傳照片後，您可以微調這些數值來對準照片中的按鈕！
        -------------------------------------------------- */
        #hit-buddha     { top: 20%; left: 10%; width: 20%; height: 15%; } /* 佛前燈 */
        #hit-merit      { top: 40%; left: 10%; width: 20%; height: 15%; } /* 消災燈 */

        #hit-l1         { top: 20%; left: 35%; width: 12%; height: 10%; } /* 大燈1 */
        #hit-l2         { top: 35%; left: 35%; width: 12%; height: 10%; } /* 大燈2 */
        #hit-l3         { top: 20%; left: 50%; width: 12%; height: 10%; } /* 大燈3 */
        #hit-l4         { top: 35%; left: 50%; width: 12%; height: 10%; } /* 大燈4 */
        #hit-niche      { top: 50%; left: 35%; width: 27%; height: 10%; } /* 龕內燈 */

        #hit-main-cast  { top: 20%; left: 70%; width: 12%; height: 10%; } /* 主法投射 */
        #hit-screen-ctl { top: 35%; left: 70%; width: 12%; height: 10%; } /* 布幕開關 */

        /* 下方引導面板 */
        .info-panel {
            width: 95%; max-width: 1200px; background: #25252d;
            padding: 15px; border-radius: 8px; text-align: center;
        }
        #task-title { color: #ffd700; font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        #hint-msg { color: #ff9800; font-size: 15px; }
    </style>
</head>
<body>

    <header>
        <h1>普豐精舍：禪堂燈控實景互動</h1>
    </header>

    <!-- 關卡選單 -->
    <div class="level-menu">
        <button class="level-btn active" id="btn-lvl1" onclick="switchLevel(1)">第一關：課前開燈</button>
        <button class="level-btn" id="btn-lvl2" onclick="switchLevel(2)">第二關：開始靜坐</button>
        <button class="level-btn" id="btn-lvl3" onclick="switchLevel(3)">第三關：開靜結束</button>
        <button class="level-btn" id="btn-lvl4" onclick="switchLevel(4)">第四關：播放PPT</button>
    </div>

    <div class="game-container">
        <!-- 左側：禪堂全暗實景與虛擬環境光 -->
        <div class="zen-hall">
            <img src="zen-dark.jpg" class="zen-bg" alt="禪堂實景">
            
            <!-- 環境光遮罩（開燈越多，這個圖層越不透明，全暗照片就會變亮） -->
            <div class="light-overlay" id="environmental-light"></div>
            
            <!-- 虛擬投影布幕 -->
            <div class="projector-screen" id="projectorScreen">📖 佛法課程 PPT 播放中</div>
        </div>

        <!-- 右側：實體開關相片區 + 透明按鈕熱區 -->
        <div class="panel-container">
            <!-- 您的實體開關牆面照片 -->
            <img src="switches-panel.jpg" class="real-panel-img" alt="實體開關面板">

            <!-- 疊加在照片按鈕位置上的「透明點擊盒」 -->
            <div class="hit-box" id="hit-buddha" onclick="toggleSwitch('buddha')"></div>
            <div class="hit-box" id="hit-merit" onclick="toggleSwitch('merit')"></div>
            <div class="hit-box" id="hit-l1" onclick="toggleSwitch('l1')"></div>
            <div class="hit-box" id="hit-l2" onclick="toggleSwitch('l2')"></div>
            <div class="hit-box" id="hit-l3" onclick="toggleSwitch('l3')"></div>
            <div class="hit-box" id="hit-l4" onclick="toggleSwitch('l4')"></div>
            <div class="hit-box" id="hit-niche" onclick="toggleSwitch('niche')"></div>
            <div class="hit-box" id="hit-main-cast" onclick="toggleSwitch('main-cast')"></div>
            <div class="hit-box" id="hit-screen-ctl" onclick="toggleSwitch('screen-ctl')"></div>
        </div>
    </div>

    <!-- 底部引導 -->
    <div class="info-panel">
        <div id="task-title">第一關任務：課前開燈</div>
        <div id="hint-msg">提示：請在右側照片中點擊對應的開關，將大燈全部打開！</div>
    </div>

    <script>
        // 狀態紀錄
        const switches = {
            buddha: false, merit: false, l1: false, l2: false, l3: false, l4: false,
            niche: false, 'main-cast': false, 'screen-ctl': false
        };
        let currentLevel = 1;

        function switchLevel(lvl) {
            currentLevel = lvl;
            for(let i=1; i<=4; i++) document.getElementById(`btn-lvl${i}`).classList.toggle('active', i === lvl);
            
            // 初始化關卡開關
            Object.keys(switches).forEach(k => switches[k] = (lvl === 2 || lvl === 4));
            if(lvl === 2 || lvl === 4) switches['screen-ctl'] = false;
            if(lvl === 3) switches['main-cast'] = true;

            // 同步按鈕樣式
            Object.keys(switches).forEach(k => {
                document.getElementById('hit-' + k).classList.toggle('active', switches[k]);
            });

            updateUIByLevel(lvl);
            updateVisuals();
        }

        function updateUIByLevel(lvl) {
            const t = document.getElementById('task-title');
            const h = document.getElementById('hint-msg');
            if(lvl===1) { t.innerText="第一關：課前開燈"; h.innerText="目標：在照片上點開所有主要照明大燈與佛前燈！"; }
            if(lvl===2) { t.innerText="第二關：開始靜坐"; h.innerText="提示：請依序關閉功能燈與大燈，最後「只留下主法投射燈」。"; }
            if(lvl===3) { t.innerText="第三關：開靜結束"; h.innerText="提示：請依序打開功能燈、大燈，恢復禪堂光明。"; }
            if(lvl===4) { t.innerText="第四關：播放PPT"; h.innerText="目標：點擊照片上的布幕開關降下布幕，並關閉「大燈 3 區」避免布幕反光。"; }
        }

        function toggleSwitch(id) {
            switches[id] = !switches[id];
            document.getElementById('hit-' + id).classList.toggle('active', switches[id]);
            updateVisuals();
            checkWinCondition();
        }

        // 核心：連動明暗與布幕
        function updateVisuals() {
            // 計算開了幾盞主要大燈
            let onCount = 0;
            const mainKeys = ['buddha', 'merit', 'l1', 'l2', 'l3', 'l4', 'niche', 'main-cast'];
            mainKeys.forEach(k => { if(switches[k]) onCount++; });

            // 依據開燈比例，調整左側黃光遮罩的透明度 (讓全暗照片變亮)
            const ratio = onCount / mainKeys.length;
            document.getElementById('environmental-light').style.opacity = ratio;

            // 連動虛擬布幕
            const screen = document.getElementById('projectorScreen');
            if (switches['screen-ctl']) screen.classList.add('down');
            else screen.classList.remove('down');
        }

        function checkWinCondition() {
            if (currentLevel === 1 && switches.buddha && switches.l1 && switches.l2 && switches.l3 && switches.l4) {
                alert("🎉 第一關成功！殿堂已大放光明。"); switchLevel(2);
            } else if (currentLevel === 2 && switches['main-cast'] && !switches.l1 && !switches.l4 && !switches.buddha) {
                alert("🎉 第二關成功！禪堂已進入靜坐定境。"); switchLevel(3);
            } else if (currentLevel === 3 && switches.l1 && switches.l2 && switches.l3 && switches.l4 && switches.buddha) {
                alert("🎉 第三關成功！順利開靜復原燈光。"); switchLevel(4);
            } else if (currentLevel === 4 && switches['screen-ctl'] && !switches.l3) {
                alert("🎉 恭喜通過全部考驗！您已經是熟練的禪堂燈控大師了！");
            }
        }

        // 啟動
        switchLevel(1);
    </script>
</body>
</html>
